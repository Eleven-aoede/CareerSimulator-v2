<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Career Simulator</title>
    <style>
      :root {
        --bg: #f7f1e7;
        --bg-deep: #eadcc9;
        --panel: rgba(255, 251, 245, 0.88);
        --panel-strong: rgba(255, 255, 255, 0.96);
        --line: rgba(93, 67, 39, 0.12);
        --ink: #2d2218;
        --muted: #7b6550;
        --accent: #c56f39;
        --accent-deep: #8f4820;
        --accent-soft: rgba(197, 111, 57, 0.12);
        --shadow: 0 22px 60px rgba(96, 63, 36, 0.14);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(213, 169, 119, 0.26), transparent 26%),
          radial-gradient(circle at top right, rgba(197, 111, 57, 0.14), transparent 24%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
        font-family: "Songti SC", "STSong", "Noto Serif CJK SC", "Source Han Serif SC", serif;
      }

      .app {
        width: min(900px, calc(100% - 28px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
      }

      .brand-title {
        font-size: clamp(24px, 4vw, 38px);
        line-height: 1.1;
        margin: 0;
      }

      .screen { display: none; }
      .screen.active { display: block; }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        padding: 28px;
      }

      .button, .button-ghost {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 10px 20px;
        border-radius: 999px;
        border: 1px solid transparent;
        font: inherit;
        font-size: 15px;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .button {
        color: #fff9f2;
        background: linear-gradient(180deg, #d58049 0%, #bf6935 100%);
        box-shadow: 0 10px 24px rgba(145, 77, 36, 0.16);
      }

      .button-ghost {
        color: var(--ink);
        background: rgba(255, 255, 255, 0.9);
        border-color: var(--line);
      }

      .button:hover, .button-ghost:hover { transform: translateY(-1px); }
      .button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

      /* === Home Screen === */
      .home-hero {
        text-align: center;
        padding: 48px 28px;
      }

      .xiaoke {
        width: 100px; height: 100px;
        border-radius: 999px;
        background: radial-gradient(circle at 30% 30%, #ffffff 0%, #fffdf8 46%, #f0e8dd 72%, #e2d5c5 100%);
        box-shadow: 0 16px 30px rgba(113, 80, 51, 0.14);
        margin: 0 auto 20px;
        position: relative;
        animation: bounce 3s ease-in-out infinite;
      }

      .xiaoke-eye {
        position: absolute;
        width: 11%; height: 15%;
        top: 36%;
        background: #2f241b;
        border-radius: 50%;
      }
      .xiaoke-eye.left { left: 31%; }
      .xiaoke-eye.right { right: 31%; }

      .xiaoke-mouth {
        position: absolute;
        left: 50%; bottom: 27%;
        width: 24%; height: 11%;
        transform: translateX(-50%);
        border-bottom: 2px solid #7c4f34;
        border-radius: 0 0 20px 20px;
      }

      @keyframes bounce {
        0%, 84%, 100% { transform: translateY(0); }
        8% { transform: translateY(-10px); }
        14% { transform: translateY(0); }
      }

      .home-hero h2 { margin: 0 0 10px; font-size: 26px; }
      .home-hero p { color: var(--muted); font-size: 15px; line-height: 1.8; margin: 0 0 24px; }

      /* === Chat Screen === */
      .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 160px);
        min-height: 500px;
      }

      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-bottom: 1px solid var(--line);
      }

      .chat-phase {
        font-size: 13px;
        color: var(--muted);
        padding: 4px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-deep);
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .msg {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: var(--radius-md);
        font-size: 15px;
        line-height: 1.8;
        white-space: pre-wrap;
      }

      .msg-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        align-self: flex-start;
        max-width: 85%;
      }

      .msg-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #ffffff 0%, #fffdf8 46%, #f0e8dd 72%, #e2d5c5 100%);
        box-shadow: 0 4px 10px rgba(113, 80, 51, 0.12);
        flex-shrink: 0;
        position: relative;
      }

      .msg-avatar::before,
      .msg-avatar::after {
        content: "";
        position: absolute;
        width: 4px; height: 5px;
        top: 11px;
        background: #2f241b;
        border-radius: 50%;
      }
      .msg-avatar::before { left: 10px; }
      .msg-avatar::after { right: 10px; }

      .msg-avatar.waiting {
        animation: avatar-bounce 0.6s ease-in-out infinite;
      }

      .msg-avatar.generating {
        animation: avatar-sway 1.2s ease-in-out infinite;
      }

      @keyframes avatar-bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }

      @keyframes avatar-sway {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(4deg); }
        75% { transform: rotate(-4deg); }
      }

      .msg-assistant {
        align-self: flex-start;
        background: var(--panel-strong);
        border: 1px solid var(--line);
        flex: 1;
      }

      .msg-user {
        align-self: flex-end;
        background: var(--accent);
        color: #fff9f2;
      }

      .msg-system {
        align-self: center;
        text-align: center;
        font-size: 13px;
        color: var(--muted);
        padding: 8px 16px;
        background: var(--accent-soft);
        border-radius: 999px;
      }

      .chat-input-area {
        display: flex;
        gap: 10px;
        padding: 16px 20px;
        border-top: 1px solid var(--line);
        background: var(--panel-strong);
        border-radius: 0 0 var(--radius-xl) var(--radius-xl);
      }

      .chat-input {
        flex: 1;
        min-height: 44px;
        max-height: 120px;
        padding: 10px 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        font: inherit;
        font-size: 15px;
        resize: none;
        outline: none;
        background: #fff;
      }

      .chat-input:focus { border-color: var(--accent); }

      .chat-actions {
        display: flex;
        gap: 8px;
        padding: 0 20px 12px;
      }

      /* === Transition === */
      .transition-card {
        text-align: center;
        padding: 40px 28px;
      }

      .transition-card p {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.9;
        margin: 0 0 24px;
      }

      .transition-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
      }

      /* === Loading === */
      .loading-card {
        text-align: center;
        padding: 60px 28px;
      }

      .loading-xiaoke {
        width: 90px; height: 90px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #ffffff 0%, #fffdf8 46%, #f0e8dd 72%, #e2d5c5 100%);
        box-shadow: 0 12px 28px rgba(113, 80, 51, 0.14);
        margin: 0 auto 24px;
        position: relative;
        animation: loading-bounce 1s ease-in-out infinite;
      }

      @keyframes loading-bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }

      .loading-xiaoke .lx-eye {
        position: absolute;
        width: 10px; height: 13px;
        top: 33px;
        background: #2f241b;
        border-radius: 50%;
        transition: all 0.3s ease;
      }
      .loading-xiaoke .lx-eye.left { left: 28px; }
      .loading-xiaoke .lx-eye.right { right: 28px; }

      .loading-xiaoke .lx-mouth {
        position: absolute;
        left: 50%; bottom: 22px;
        width: 22px; height: 10px;
        transform: translateX(-50%);
        border-bottom: 2px solid #7c4f34;
        border-radius: 0 0 16px 16px;
        transition: all 0.3s ease;
      }

      /* Expression: wink */
      .loading-xiaoke.expr-wink .lx-eye.right {
        height: 3px;
        top: 38px;
        border-radius: 3px;
      }

      /* Expression: smile */
      .loading-xiaoke.expr-smile .lx-mouth {
        height: 12px;
        border-bottom: none;
        background: #7c4f34;
        border-radius: 0 0 16px 16px;
        clip-path: ellipse(50% 60% at 50% 40%);
      }

      /* Expression: squint */
      .loading-xiaoke.expr-squint .lx-eye {
        height: 4px;
        top: 37px;
        border-radius: 4px;
      }

      .loading-card p {
        color: var(--muted);
        font-size: 15px;
        min-height: 24px;
        transition: opacity 0.4s ease;
      }

      /* === Simulator === */
      .sim-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 20px;
      }

      .sim-sidebar {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .sim-sidebar .card { padding: 18px; }

      .sim-progress-bar {
        height: 6px;
        background: var(--line);
        border-radius: 3px;
        margin-top: 10px;
        overflow: hidden;
      }

      .sim-progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 3px;
        transition: width 300ms ease;
      }

      .sim-history-item {
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        line-height: 1.6;
      }

      .sim-history-item strong { display: block; font-size: 14px; }

      .sim-main .card { padding: 28px; }

      .sim-scene { margin-bottom: 24px; }
      .sim-scene.past { opacity: 0.6; }

      .sim-scene-tag {
        font-size: 12px;
        color: var(--accent-deep);
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }

      .sim-scene h2 { margin: 0 0 12px; font-size: 20px; }
      .sim-scene p { margin: 0 0 10px; line-height: 1.9; font-size: 15px; }

      .sim-subtitle {
        color: var(--muted);
        font-size: 14px;
        margin: 10px 0;
      }

      .sim-materials {
        margin: 14px 0;
        padding: 14px;
        background: rgba(197, 111, 57, 0.06);
        border-radius: var(--radius-md);
        border: 1px solid rgba(197, 111, 57, 0.15);
      }

      .sim-materials strong { display: block; margin-bottom: 8px; font-size: 13px; }
      .sim-materials-list div { padding: 6px 0; border-bottom: 1px solid var(--line); font-size: 14px; line-height: 1.7; }
      .sim-materials-list div:last-child { border-bottom: none; }

      .sim-options { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }

      .sim-option {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: var(--panel-strong);
        font: inherit;
        font-size: 15px;
        cursor: pointer;
        text-align: left;
        transition: border-color 180ms, background 180ms;
      }

      .sim-option:hover {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .sim-option-code {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px; height: 26px;
        border-radius: 50%;
        background: var(--accent-soft);
        color: var(--accent-deep);
        font-size: 12px;
        flex-shrink: 0;
      }

      .sim-picked {
        margin-top: 10px;
        padding: 10px 14px;
        background: var(--accent-soft);
        border-radius: var(--radius-md);
        font-size: 14px;
        line-height: 1.7;
      }

      .sim-ending {
        margin-top: 16px;
        padding: 16px;
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        font-size: 14px;
        line-height: 1.8;
      }

      .sim-actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }

      @media (max-width: 768px) {
        .sim-layout { grid-template-columns: 1fr; }
        .sim-sidebar { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="brand">
        <h1 class="brand-title">Career Simulator</h1>
      </div>

      <!-- Home Screen -->
      <section id="screen-home" class="screen active">
        <div class="card home-hero">
          <div class="xiaoke">
            <div class="xiaoke-eye left"></div>
            <div class="xiaoke-eye right"></div>
            <div class="xiaoke-mouth"></div>
          </div>
          <h2>职业穿越游戏</h2>
          <p>和小可一起，走进一份工作最真实的节奏里。<br />你会体验到任务、压力、成就，和属于那个岗位的日常。</p>
          <button class="button" id="startBtn">开始旅程</button>
        </div>
      </section>

      <!-- Chat Screen -->
      <section id="screen-chat" class="screen">
        <div class="card chat-container">
          <div class="chat-header">
            <span style="font-size:15px;font-weight:600;">小可</span>
            <span class="chat-phase" id="chatPhase">岗位信息收集</span>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-actions" id="chatActions"></div>
          <div class="chat-input-area">
            <textarea class="chat-input" id="chatInput" rows="1" placeholder="输入你的回答..."></textarea>
            <button class="button" id="sendBtn">发送</button>
            <button class="button-ghost" id="skipProfileChatBtn" style="display:none;white-space:nowrap;font-size:13px;">跳过画像</button>
          </div>
        </div>
      </section>

      <!-- Transition Screen (Job -> Profile) -->
      <section id="screen-transition" class="screen">
        <div class="card transition-card">
          <div class="xiaoke" style="width:80px;height:80px;margin:0 auto 20px;">
            <div class="xiaoke-eye left"></div>
            <div class="xiaoke-eye right"></div>
            <div class="xiaoke-mouth"></div>
          </div>
          <p id="transitionText"></p>
          <div class="transition-actions">
            <button class="button" id="continueProfileBtn">继续，认识我一下</button>
            <button class="button-ghost" id="skipProfileBtn">跳过，直接生成</button>
          </div>
        </div>
      </section>

      <!-- Loading Screen (Story Generation) -->
      <section id="screen-loading" class="screen">
        <div class="card loading-card">
          <div class="loading-xiaoke" id="loadingXiaoke">
            <div class="lx-eye left"></div>
            <div class="lx-eye right"></div>
            <div class="lx-mouth"></div>
          </div>
          <p id="loadingText">正在定制职业旅程，体验马上开始</p>
        </div>
      </section>

      <!-- Simulator Screen -->
      <section id="screen-simulator" class="screen">
        <div class="sim-layout">
          <aside class="sim-sidebar">
            <div class="card">
              <div id="simEyebrow" style="font-size:11px;letter-spacing:0.08em;color:var(--muted);"></div>
              <h3 id="simTitle" style="margin:6px 0 8px;font-size:17px;"></h3>
              <div id="simDescription" style="font-size:13px;color:var(--muted);line-height:1.7;"></div>
              <div id="simMeta" style="margin-top:12px;font-size:13px;line-height:1.8;"></div>
            </div>
            <div class="card">
              <strong style="font-size:14px;">进度</strong>
              <div style="font-size:13px;color:var(--muted);margin-top:4px;" id="simProgressText">0 / 0</div>
              <div class="sim-progress-bar"><div class="sim-progress-fill" id="simProgressFill"></div></div>
            </div>
            <div class="card" style="flex:1;overflow-y:auto;">
              <strong style="font-size:14px;">选择记录</strong>
              <div id="simHistory"></div>
            </div>
          </aside>
          <main class="sim-main">
            <div class="card">
              <div id="simRoot"></div>
              <div class="sim-actions">
                <button class="button-ghost" id="simRestartBtn">重新开始</button>
                <button class="button-ghost" id="simBackBtn">返回首页</button>
              </div>
            </div>
          </main>
        </div>
      </section>
    </div>

    <script>
      const API_BASE = window.location.origin + "/api";

      const state = {
        sessionId: null,
        phase: null,
        activeScript: null,
        simCurrentId: "intro",
        simHistory: [],
        simChoices: {},
        simScore: { fit: 0, stress: 0, growth: 0 },
        streaming: false,
      };

      // DOM refs
      const startBtn = document.getElementById("startBtn");
      const chatMessages = document.getElementById("chatMessages");
      const chatInput = document.getElementById("chatInput");
      const sendBtn = document.getElementById("sendBtn");
      const chatPhase = document.getElementById("chatPhase");
      const chatActions = document.getElementById("chatActions");
      const transitionText = document.getElementById("transitionText");
      const continueProfileBtn = document.getElementById("continueProfileBtn");
      const skipProfileBtn = document.getElementById("skipProfileBtn");
      const skipProfileChatBtn = document.getElementById("skipProfileChatBtn");
      const loadingText = document.getElementById("loadingText");
      const simRoot = document.getElementById("simRoot");
      const simEyebrow = document.getElementById("simEyebrow");
      const simTitle = document.getElementById("simTitle");
      const simDescription = document.getElementById("simDescription");
      const simMeta = document.getElementById("simMeta");
      const simProgressText = document.getElementById("simProgressText");
      const simProgressFill = document.getElementById("simProgressFill");
      const simHistory = document.getElementById("simHistory");
      const simRestartBtn = document.getElementById("simRestartBtn");
      const simBackBtn = document.getElementById("simBackBtn");

      // === Screen Management ===
      function showScreen(id) {
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.getElementById("screen-" + id).classList.add("active");
      }

      // === Markdown Rendering ===
      function renderMarkdown(text) {
        let html = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
        html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
        html = html.replace(/\n/g, "<br>");
        return html;
      }

      // === Chat Logic ===
      let currentAvatar = null;

      function addMessage(role, content) {
        const msgDiv = document.createElement("div");
        msgDiv.className = "msg msg-" + role;

        if (role === "assistant") {
          const row = document.createElement("div");
          row.className = "msg-row";

          const avatar = document.createElement("div");
          avatar.className = "msg-avatar";
          currentAvatar = avatar;

          if (content === "") {
            msgDiv.innerHTML = renderMarkdown(content);
          } else {
            msgDiv.innerHTML = renderMarkdown(content);
          }

          row.appendChild(avatar);
          row.appendChild(msgDiv);
          chatMessages.appendChild(row);
        } else {
          msgDiv.textContent = content;
          chatMessages.appendChild(msgDiv);
        }

        chatMessages.scrollTop = chatMessages.scrollHeight;
        return msgDiv;
      }

      function showAvatarWaiting() {
        if (currentAvatar) currentAvatar.className = "msg-avatar waiting";
      }

      function showAvatarGenerating() {
        if (currentAvatar) currentAvatar.className = "msg-avatar generating";
      }

      function showAvatarIdle() {
        if (currentAvatar) currentAvatar.className = "msg-avatar";
      }

      function addSystemMessage(content) {
        const div = document.createElement("div");
        div.className = "msg msg-system";
        div.textContent = content;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function updatePhaseLabel() {
        const labels = {
          job_collection: "岗位信息收集",
          profile_collection: "用户画像采集",
          story_generation: "生成中",
          complete: "完成",
        };
        chatPhase.textContent = labels[state.phase] || state.phase;
        skipProfileChatBtn.style.display = state.phase === "profile_collection" ? "" : "none";
      }

      async function createSession() {
        const resp = await fetch(API_BASE + "/sessions", { method: "POST" });
        const data = await resp.json();
        state.sessionId = data.session_id;
        state.phase = data.phase;
        updatePhaseLabel();
        addMessage("assistant", data.greeting);
      }

      async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text || state.streaming) return;

        addMessage("user", text);
        chatInput.value = "";
        chatInput.style.height = "auto";

        state.streaming = true;
        sendBtn.disabled = true;

        const assistantDiv = addMessage("assistant", "");
        showAvatarWaiting();
        let fullText = "";
        let firstToken = true;

        try {
          const resp = await fetch(
            API_BASE + "/sessions/" + state.sessionId + "/chat/stream",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ message: text }),
            }
          );

          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();

            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              const eventData = JSON.parse(line.slice(6));

              if (eventData.type === "token") {
                if (firstToken) {
                  showAvatarGenerating();
                  firstToken = false;
                }
                fullText += eventData.content;
                assistantDiv.innerHTML = renderMarkdown(fullText);
                chatMessages.scrollTop = chatMessages.scrollHeight;
              } else if (eventData.type === "done") {
                state.phase = eventData.phase;
                updatePhaseLabel();

                if (eventData.phase_complete && eventData.transition_text) {
                  // 岗位收集完成：在聊天界面底部显示"继续"按钮，让用户看完回复后手动跳转
                  const actionDiv = document.createElement("div");
                  actionDiv.style.cssText = "display:flex;gap:10px;justify-content:center;padding:12px 0;";
                  actionDiv.innerHTML = `<button class="button" id="toTransitionBtn">继续下一步</button>`;
                  chatMessages.appendChild(actionDiv);
                  chatMessages.scrollTop = chatMessages.scrollHeight;
                  document.getElementById("toTransitionBtn").addEventListener("click", () => {
                    transitionText.textContent = eventData.transition_text;
                    showScreen("transition");
                  });
                } else if (eventData.phase_complete && eventData.phase === "story_generation") {
                  const actionDiv = document.createElement("div");
                  actionDiv.style.cssText = "display:flex;gap:10px;justify-content:center;padding:12px 0;";
                  actionDiv.innerHTML = `<button class="button" id="startSimBtn2">开始模拟</button>`;
                  chatMessages.appendChild(actionDiv);
                  chatMessages.scrollTop = chatMessages.scrollHeight;
                  document.getElementById("startSimBtn2").addEventListener("click", () => generateStory());
                }
              }
            }
          }
        } catch (err) {
          assistantDiv.textContent = "网络错误，请重试。";
        }

        showAvatarIdle();
        state.streaming = false;
        sendBtn.disabled = false;
        chatInput.focus();
      }

      async function continueToProfile() {
        showScreen("chat");
        addSystemMessage("进入画像采集阶段");
        updatePhaseLabel();
        // Send empty trigger to get the profile opening
        const assistantDiv = addMessage("assistant", "");
        showAvatarWaiting();
        let fullText = "";
        let firstToken = true;

        state.streaming = true;
        sendBtn.disabled = true;

        try {
          const resp = await fetch(
            API_BASE + "/sessions/" + state.sessionId + "/chat/stream",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ message: "好的，我准备好了" }),
            }
          );

          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();

            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              const eventData = JSON.parse(line.slice(6));

              if (eventData.type === "token") {
                if (firstToken) {
                  showAvatarGenerating();
                  firstToken = false;
                }
                fullText += eventData.content;
                assistantDiv.innerHTML = renderMarkdown(fullText);
                chatMessages.scrollTop = chatMessages.scrollHeight;
              } else if (eventData.type === "done") {
                state.phase = eventData.phase;
                updatePhaseLabel();
                if (eventData.phase_complete && eventData.phase === "story_generation") {
                  const actionDiv = document.createElement("div");
                  actionDiv.style.cssText = "display:flex;gap:10px;justify-content:center;padding:12px 0;";
                  actionDiv.innerHTML = `<button class="button" id="startSimBtn">开始模拟</button>`;
                  chatMessages.appendChild(actionDiv);
                  chatMessages.scrollTop = chatMessages.scrollHeight;
                  document.getElementById("startSimBtn").addEventListener("click", () => generateStory());
                }
              }
            }
          }
        } catch (err) {
          assistantDiv.textContent = "网络错误，请重试。";
        }

        showAvatarIdle();
        state.streaming = false;
        sendBtn.disabled = false;
      }

      async function skipProfile() {
        try {
          const resp = await fetch(
            API_BASE + "/sessions/" + state.sessionId + "/skip-profile",
            { method: "POST" }
          );
          const data = await resp.json();
          if (!resp.ok) {
            alert(data.detail || "操作失败，请重试");
            return;
          }
          state.phase = data.phase;
          generateStory();
        } catch (err) {
          alert("网络错误，请重试");
        }
      }

      // Loading page: rotating tips and expressions
      const loadingTips = [
        "正在定制职业旅程，体验马上开始",
        "在体验中发现适合自己的岗位",
        "每一份工作都有独特的节奏和压力",
        "小可正在为你搭建真实的工作场景",
        "好的体验需要一点时间，请稍等",
        "模拟即将开始，准备好了吗",
        "你将从第一天开始，感受这份工作的日常",
        "选择没有对错，只有更贴近你的那个",
      ];
      const loadingExpressions = ["", "expr-wink", "expr-smile", "expr-squint"];
      let loadingTipTimer = null;
      let loadingExprTimer = null;

      function startLoadingAnimations() {
        let tipIndex = 0;
        let exprIndex = 0;
        const xiaoke = document.getElementById("loadingXiaoke");

        loadingText.textContent = loadingTips[0];

        loadingTipTimer = setInterval(() => {
          tipIndex = (tipIndex + 1) % loadingTips.length;
          loadingText.style.opacity = "0";
          setTimeout(() => {
            loadingText.textContent = loadingTips[tipIndex];
            loadingText.style.opacity = "1";
          }, 300);
        }, 3500);

        loadingExprTimer = setInterval(() => {
          exprIndex = (exprIndex + 1) % loadingExpressions.length;
          xiaoke.className = "loading-xiaoke " + loadingExpressions[exprIndex];
        }, 2200);
      }

      function stopLoadingAnimations() {
        if (loadingTipTimer) { clearInterval(loadingTipTimer); loadingTipTimer = null; }
        if (loadingExprTimer) { clearInterval(loadingExprTimer); loadingExprTimer = null; }
      }

      async function generateStory() {
        showScreen("loading");
        startLoadingAnimations();

        try {
          const resp = await fetch(
            API_BASE + "/sessions/" + state.sessionId + "/generate-story",
            { method: "POST" }
          );

          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();

            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              const eventData = JSON.parse(line.slice(6));

              if (eventData.type === "progress") {
                loadingText.textContent = eventData.message;
              } else if (eventData.type === "complete") {
                stopLoadingAnimations();
                state.activeScript = eventData.script;
                state.phase = "complete";
                resetSimulationState();
                renderSimulation();
                showScreen("simulator");
              } else if (eventData.type === "error") {
                loadingText.textContent = eventData.message;
              }
            }
          }
        } catch (err) {
          stopLoadingAnimations();
          loadingText.textContent = "生成失败，请刷新重试。";
        }
      }

      // === Simulator Engine (preserved from original) ===
      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      function getSimNode(nodeId) {
        return state.activeScript ? state.activeScript.story[nodeId] : null;
      }

      function getSimChoiceLabel(nodeId, key) {
        const node = getSimNode(nodeId);
        if (!node || !node.options) return "";
        const option = node.options.find(item => item.key === key);
        return option ? option.label : "";
      }

      function resetSimulationState() {
        state.simCurrentId = "intro";
        state.simHistory = [];
        state.simChoices = {};
        state.simScore = { fit: 0, stress: 0, growth: 0 };
      }

      function applySimEffect(effect = {}) {
        state.simScore.fit += effect.fit || 0;
        state.simScore.stress += effect.stress || 0;
        state.simScore.growth += effect.growth || 0;
      }

      function getSimProgressTotal() {
        if (!state.activeScript) return 0;
        let currentId = "intro";
        let count = 0;
        const seen = new Set();
        while (currentId && currentId !== "__ENDING__" && count < 80) {
          const node = getSimNode(currentId);
          if (!node || !Array.isArray(node.options) || node.options.length === 0) break;
          if (currentId !== "intro") count += 1;
          if (seen.has(currentId)) break;
          seen.add(currentId);
          currentId = node.options[0].next;
        }
        return Math.max(count, 1);
      }

      function getSimProgressCount() {
        const offset = state.simHistory.length > 0 && state.simHistory[0].nodeId === "intro" ? 1 : 0;
        return Math.min(Math.max(state.simHistory.length - offset, 0), getSimProgressTotal());
      }

      function getEndingBucket() {
        const fit = state.simScore.fit;
        if (fit >= 9) return "high";
        if (fit >= 3) return "mid";
        return "low";
      }

      function buildEnding() {
        const action = state.simChoices.taskAction
          ? getSimChoiceLabel("taskAction", state.simChoices.taskAction)
          : "还没有进入典型任务试做";
        const emotion = state.simChoices.taskEmotion
          ? getSimChoiceLabel("taskEmotion", state.simChoices.taskEmotion)
          : "尚未记录";
        const difficulty = state.simChoices.taskDifficulty
          ? getSimChoiceLabel("taskDifficulty", state.simChoices.taskDifficulty)
          : "尚未记录";

        const bucket = getEndingBucket();
        const endingBase = state.activeScript.endings[bucket];
        return {
          tag: "结局",
          title: endingBase.title,
          paragraphs: endingBase.paragraphs,
          recap: `在典型任务试做里，你选择了"${action}"，当下更像"${emotion}"，主观难度是"${difficulty}"。`,
          matchLabel: endingBase.matchLabel,
          reason: endingBase.reason,
        };
      }

      function renderSimMeta() {
        simEyebrow.textContent = state.activeScript.meta.eyebrow || "SIMULATION";
        simTitle.innerHTML = state.activeScript.meta.title || "职业旅程";
        simDescription.textContent = state.activeScript.meta.description || "";
        simMeta.innerHTML = (state.activeScript.meta.settings || [])
          .map(item => `<div style="margin-top:4px;"><strong>${escapeHtml(item.label)}</strong> ${escapeHtml(item.value)}</div>`)
          .join("");
      }

      function renderSimScene(node, mode, pickedLabel = "") {
        const paragraphs = node.paragraphs.map(p => `<p>${escapeHtml(p)}</p>`).join("");

        const materials = Array.isArray(node.materials)
          ? `<div class="sim-materials"><strong>给你的原始材料</strong><div class="sim-materials-list">${node.materials.map(m => `<div>${escapeHtml(m)}</div>`).join("")}</div></div>`
          : "";

        const picked = pickedLabel
          ? `<div class="sim-picked"><strong>你的选择</strong><br />${escapeHtml(pickedLabel)}</div>`
          : "";

        const options = mode === "active"
          ? `${node.prompt ? `<div class="sim-subtitle">${escapeHtml(node.prompt)}</div>` : ""}
             <div class="sim-options">${node.options.map(o => `<button class="sim-option" type="button" data-key="${escapeHtml(o.key)}"><span class="sim-option-code">${escapeHtml(o.key)}</span>${escapeHtml(o.label)}</button>`).join("")}</div>`
          : picked;

        return `<article class="sim-scene ${mode}">
          <div class="sim-scene-tag">${escapeHtml(node.tag)}</div>
          <h2>${escapeHtml(node.title)}</h2>
          ${node.subtitle ? `<div class="sim-subtitle">${escapeHtml(node.subtitle)}</div>` : ""}
          ${paragraphs}${materials}${options}
        </article>`;
      }

      function renderSimEnding() {
        const ending = buildEnding();
        return `<article class="sim-scene ending">
          <div class="sim-scene-tag">${escapeHtml(ending.tag)}</div>
          <h2>${escapeHtml(ending.title)}</h2>
          ${ending.paragraphs.map(p => `<p>${escapeHtml(p)}</p>`).join("")}
          <div class="sim-picked">${escapeHtml(ending.recap)}</div>
          <div class="sim-ending">
            <div><strong>匹配感：</strong>${escapeHtml(ending.matchLabel)}</div>
            <div style="margin-top:8px;"><strong>原因：</strong>${escapeHtml(ending.reason)}</div>
          </div>
        </article>`;
      }

      function renderSimHistory() {
        if (state.simHistory.length === 0) {
          simHistory.innerHTML = `<div class="sim-history-item"><strong>还没开始</strong>点击选项开始记录路径。</div>`;
          return;
        }
        simHistory.innerHTML = state.simHistory
          .map(item => {
            const node = getSimNode(item.nodeId);
            return `<div class="sim-history-item"><strong>${escapeHtml(node.title)}</strong>${escapeHtml(getSimChoiceLabel(item.nodeId, item.optionKey))}</div>`;
          }).join("");
      }

      function renderSimulation() {
        if (!state.activeScript) return;
        renderSimMeta();
        renderSimHistory();

        const progress = getSimProgressCount();
        const progressTotal = getSimProgressTotal();
        simProgressText.textContent = `${progress} / ${progressTotal}`;
        simProgressFill.style.width = `${progressTotal ? (progress / progressTotal) * 100 : 0}%`;

        const historyMarkup = state.simHistory
          .map(item => renderSimScene(getSimNode(item.nodeId), "past", getSimChoiceLabel(item.nodeId, item.optionKey)))
          .join("");

        const activeMarkup = state.simCurrentId === "__ENDING__"
          ? renderSimEnding()
          : renderSimScene(getSimNode(state.simCurrentId), "active");

        simRoot.innerHTML = historyMarkup + activeMarkup;

        simRoot.querySelectorAll(".sim-option").forEach(button => {
          button.addEventListener("click", () => handleSimChoice(button.getAttribute("data-key")));
        });
      }

      function handleSimChoice(key) {
        const node = getSimNode(state.simCurrentId);
        const option = node.options.find(item => item.key === key);
        if (!option) return;

        state.simHistory.push({ nodeId: state.simCurrentId, optionKey: key });
        state.simChoices[state.simCurrentId] = key;
        applySimEffect(option.effect);
        state.simCurrentId = option.next;
        renderSimulation();
      }

      // === Event Listeners ===
      startBtn.addEventListener("click", async () => {
        showScreen("chat");
        await createSession();
      });

      sendBtn.addEventListener("click", sendMessage);

      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      chatInput.addEventListener("input", () => {
        chatInput.style.height = "auto";
        chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + "px";
      });

      continueProfileBtn.addEventListener("click", continueToProfile);
      skipProfileBtn.addEventListener("click", skipProfile);
      skipProfileChatBtn.addEventListener("click", skipProfile);

      simRestartBtn.addEventListener("click", () => {
        if (!state.activeScript) return;
        resetSimulationState();
        renderSimulation();
      });

      simBackBtn.addEventListener("click", () => showScreen("home"));
    </script>
  </body>
</html>
